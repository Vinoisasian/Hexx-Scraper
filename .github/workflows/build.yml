name: Build and Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
          
      - name: Build Python Sidecar
        shell: bash
        run: |
          python scripts/build_sidecar.py

      - name: Install Frontend Dependencies
        run: |
          cd hexx-scrape
          npm install

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Hexx Scraper ${{ github.ref_name }}'
          releaseBody: 'Automated release of Hexx Scraper'
          releaseDraft: false
          prerelease: false
          projectPath: hexx-scrape

      - name: Upload Binaries (Fallback)
        uses: actions/upload-artifact@v4
        with:
          name: Hexx-Scraper-${{ matrix.platform }}
          path: |
            hexx-scrape/src-tauri/target/release/bundle/msi/*.msi
            hexx-scrape/src-tauri/target/release/bundle/dmg/*.dmg
